services:
  cdk:
    build: ./docker/cdk
    env_file:
      - .env.localstack
    environment:
      AWS_ENDPOINT_URL: http://${DOCKER_LOCALSTACK_IP:-10.5.0.5}:4566
      AWS_ENDPOINT_URL_S3: http://${DOCKER_LOCALSTACK_IP:-10.5.0.5}:4566
      AES_KEY: ${AES_KEY:-12345678901234567890123456789012}
      BITBUCKET_API_TOKEN: ${BITBUCKET_API_TOKEN:-token_bitbucket}
      GITHUB_ACCESS_TOKEN: ${GITHUB_ACCESS_TOKEN:-token_github}
      IA_PROVIDER: ${IA_PROVIDER:-openai}
      IA_MODEL: ${IA_MODEL:-gpt-4o-mini}
      IA_API_KEY: ${IA_API_KEY:-api_key_ia}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-pk-lf-b96f6b9a-7e2c-4701-901c-9a06d9f9b255}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-sk-lf-8849756d-7227-43b1-a480-e5ada33d0622}
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL:-https://us.cloud.langfuse.com}
    volumes:
      - ./localstack/app:/app
      - ./prompts:/app/prompts
    depends_on:
      - localstack
    networks:
      - localstack
  mcp-gateway:
    image: node:22.20-bookworm
    env_file:
      - .env.localstack
    working_dir: /app
    user: 1000:1000
    command: yarn start:dev-install
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      CLOUD_PROVIDER: aws
      AWS_ENDPOINT_URL: http://${DOCKER_LOCALSTACK_IP:-10.5.0.5}:4566
      AWS_ENDPOINT_URL_S3: http://${DOCKER_LOCALSTACK_IP:-10.5.0.5}:4566
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_QUEUE_URL: http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/tvo-mcp-gateway-output-local
      AWS_EVENTBUS_NAME: ${AWS_EVENTBUS_NAME:-tvo-event-bus-local}
      AWS_DYNAMODB_TABLE_NAME: ${AWS_DYNAMODB_TABLE_NAME:-tvo-mcp-jobs-local}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME:-tvo-mcp-git-commit-files-input-local}
    volumes:
      - ./src/mcp/gateway:/app
    depends_on:
      - localstack
    networks:
      - localstack
    extra_hosts:
      - "sqs.us-east-1.localhost.localstack.cloud:${DOCKER_LOCALSTACK_IP:-10.5.0.5}"
  git-commit-files:
    build: ./docker/lambda/node
    env_file:
      - .env.localstack
    environment:
      AWS_ENDPOINT_URL: http://${DOCKER_LOCALSTACK_IP:-10.5.0.5}:4566
      AWS_ENDPOINT_URL_S3: http://${DOCKER_LOCALSTACK_IP:-10.5.0.5}:4566
      CDK_STACK_NAME: McpGitCommitFilesStack
    volumes:
      - ./src/mcp/git-commit-files:/home/node/app
    depends_on:
      - localstack
    networks:
      - localstack
  bitbucket-code-insights:
    build: ./docker/lambda/node
    env_file:
      - .env.localstack
    environment:
      AWS_ENDPOINT_URL: http://${DOCKER_LOCALSTACK_IP:-10.5.0.5}:4566
      AWS_ENDPOINT_URL_S3: http://${DOCKER_LOCALSTACK_IP:-10.5.0.5}:4566
      CDK_STACK_NAME: McpBitbucketCodeInsightsStack
    volumes:
      - ./src/mcp/bitbucket-code-insights:/home/node/app
    depends_on:
      - localstack
    networks:
      - localstack
  github-issue:
    build: ./docker/lambda/node
    env_file:
      - .env.localstack
    environment:
      AWS_ENDPOINT_URL: http://${DOCKER_LOCALSTACK_IP:-10.5.0.5}:4566
      AWS_ENDPOINT_URL_S3: http://${DOCKER_LOCALSTACK_IP:-10.5.0.5}:4566
      CDK_STACK_NAME: McpGithubIssueStack
    volumes:
      - ./src/mcp/github-issue:/home/node/app
    depends_on:
      - localstack
    networks:
      - localstack
  issue-report:
    build: ./docker/lambda/node
    env_file:
      - .env.localstack
    environment:
      AWS_ENDPOINT_URL: http://${DOCKER_LOCALSTACK_IP:-10.5.0.5}:4566
      AWS_ENDPOINT_URL_S3: http://${DOCKER_LOCALSTACK_IP:-10.5.0.5}:4566
      CDK_STACK_NAME: McpIssueReportStack
    volumes:
      - ./src/mcp/issue-report:/home/node/app
    depends_on:
      - localstack
    networks:
      - localstack
  agent:
    build: ./docker/batch
    volumes:
      - ./src/agent:/app
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - localstack
    networks:
      - localstack
  trigger:
    build:
      context: ./docker/lambda/node
    env_file:
      - .env.localstack
    environment:
      AWS_ENDPOINT_URL: http://${DOCKER_LOCALSTACK_IP:-10.5.0.5}:4566
      AWS_ENDPOINT_URL_S3: http://${DOCKER_LOCALSTACK_IP:-10.5.0.5}:4566
      CDK_STACK_NAME: ApiTaskTriggerStack
    volumes:
      - ./src/api/task/trigger:/home/node/app
    depends_on:
      - localstack
    networks:
      - localstack
  localstack:
    image: localstack/localstack:4.8.1
    ports:
      - 4566:4566
      - 4510-4559:4510-4559
    volumes:
      - localstack:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      ACTIVATE_PRO: "0"
    networks:
      localstack:
        ipv4_address: ${DOCKER_LOCALSTACK_IP:-10.5.0.5}
volumes:
  localstack:

networks:
  localstack:
    driver: bridge
    ipam:
      config:
        - subnet: ${DOCKER_NETWORK_SUBNET:-10.5.0.0/16}
          gateway: ${DOCKER_NETWORK_GATEWAY:-10.5.0.1}