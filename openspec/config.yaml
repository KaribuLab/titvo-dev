schema: spec-driven

context: |
  Tech stack: Python, TypeScript, Node.js, AWS, Docker, LocalStack, Terraform, Terragrunt, CDKLocal, MCP, Langfuse.
  We use conventional commits
  Domain: cybersecurity
  This repository works like a monorepo, but with git submodules.
  The project is divided into the following directories:
   src/mcp: MCP tools that are used by the agent to analyze the code.
   src/agent: Agent that analyzes the code and generates a report.
   src/api: REST API that triggers the agent.

rules:
  proposal:
    - Keep proposals under 500 words
    - Always include a "Non-goals" section
  tasks:
    - Break tasks into chunks of max 2 hours
    - Always include a final task group "Documentation" with tasks to update the files
      in docs/ that are relevant to the change (e.g. docs/architecture.md,
      docs/prompts.md, docs/rag-indexer.md). Identify which docs are affected based
      on what the change modifies and include one task per file to update.
